      - name: Setup EDHOC-Fuzzer
        run: ./scripts/setup_fuzzer.sh -l

      - name: Setup RISE
        run: ./scripts/setup_sul.sh rise

      - name: Test RISE Client (m4_app, Mealy)
        run: java -jar edhoc-fuzzer.jar @experiments/args/rise/client_m4_app -roundLimit 4

      - name: Upload results
