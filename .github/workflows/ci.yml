name: CI
on: [push, pull_request]

jobs:
  Lakers-Client:
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: ts-graphviz/setup-graphviz@v2
      - name: Install pydot
        run: pip3 install pydot

      - name: Setup EDHOC-Fuzzer
        run: ./scripts/setup_fuzzer.sh -l

      - name: Setup Lakers
        run: |
          curl --proto '=https' --tlsv1.3 https://sh.rustup.rs -sSf | sh -s -- -y
          source "${HOME}/.cargo/env"
          rustup toolchain install nightly-2025-05-10-x86_64-unknown-linux-gnu
          ./scripts/setup_sul.sh lakers

      - name: Test Lakers Client (Mealy)
        run: java -jar edhoc-fuzzer.jar @experiments/args/lakers/client -roundLimit 3

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: Lakers Client
          path: experiments/results/clients/mealy/lakers

      - name: Diff Mealy
        run: ./scripts/diff_hyps.sh experiments/saved_results/clients/mealy/lakers experiments/results/clients/mealy/lakers 3

  Lakers-Server:
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: ts-graphviz/setup-graphviz@v2
      - name: Install pydot
        run: pip3 install pydot

      - name: Setup EDHOC-Fuzzer
        run: ./scripts/setup_fuzzer.sh -l

      - name: Setup Lakers
        run: |
          curl --proto '=https' --tlsv1.3 https://sh.rustup.rs -sSf | sh -s -- -y
          source "${HOME}/.cargo/env"
          rustup toolchain install nightly-2025-05-10-x86_64-unknown-linux-gnu
          ./scripts/setup_sul.sh lakers

      - name: Test Lakers Server (Mealy)
        run: java -jar edhoc-fuzzer.jar @experiments/args/lakers/server -roundLimit 3

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: Lakers Server
          path: experiments/results/servers/mealy/lakers

      - name: Diff Mealy
        run: ./scripts/diff_hyps.sh experiments/saved_results/servers/mealy/lakers experiments/results/servers/mealy/lakers 2

  RISE-Client:
